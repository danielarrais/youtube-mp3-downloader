# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
name: youtube-mp3-downloader
arch: amd64
platform: linux
version: ${VERSION}
section: sound
priority: optional
maintainer: Daniel Arrais <danielarraiscarvalho@gmail.com>
description: |
  Desktop application for downloading YouTube videos and playlists as MP3.
vendor: Daniel Arrais
homepage: https://github.com/danielarrais/best-youtube-mp3-downloader
license: Proprietary
depends:
  - ca-certificates
  - libgtk-3-0t64
  - libwebkit2gtk-4.1-0
contents:
  - src: ./build/bin/youtube-mp3-downloader
    dst: /opt/youtube-mp3-downloader/youtube-mp3-downloader
    file_info:
      mode: 0755
  - src: ./build/linux/package/ffmpeg
    dst: /opt/youtube-mp3-downloader/ffmpeg
    file_info:
      mode: 0755
  - src: /opt/youtube-mp3-downloader/youtube-mp3-downloader
    dst: /usr/bin/youtube-mp3-downloader
    type: symlink
  - src: ./build/linux/youtube-mp3-downloader.desktop
    dst: /usr/share/applications/youtube-mp3-downloader.desktop
    file_info:
      mode: 0644
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/1024x1024/apps/youtube-mp3-downloader.png
    file_info:
      mode: 0644
  - src: ./build/appicon.png
    dst: /usr/share/pixmaps/youtube-mp3-downloader.png
    file_info:
      mode: 0644
