name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install build tools
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "C:\Program Files (x86)\NSIS" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          (Join-Path (go env GOPATH) "bin") |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $extract = Join-Path $env:RUNNER_TEMP "ffmpeg"
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extract
          $ffmpeg = Get-ChildItem $extract -Recurse -Filter "ffmpeg.exe" |
            Select-Object -First 1
          if (-not $ffmpeg) {
            throw "ffmpeg.exe was not found in the downloaded archive"
          }
          New-Item -ItemType Directory `
            -Force "build/windows/installer/resources" | Out-Null
          Copy-Item $ffmpeg.FullName `
            "build/windows/installer/resources/ffmpeg.exe"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test backend
        run: go test ./...

      - name: Vet backend
        run: go vet ./...

      - name: Build installer
        shell: pwsh
        run: |
          wails build `
            -platform windows/amd64 `
            -nsis `
            -webview2 embed `
            -clean

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: yt-mp3-go-windows-amd64
          path: build/bin/*-installer.exe
          if-no-files-found: error
